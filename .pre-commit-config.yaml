repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: validate-atlas-markers
        name: validate-atlas-markers
        language: system
        entry: uv run .claude/commands/validate-atlas-markers.py
        pass_filenames: false
        files: ATLAS\.md$

      - id: claudelint
        name: claudelint
        language: system
        entry: uvx claudelint --strict
        pass_filenames: false
        files: \.(json|md|yaml)$

      - id: test-llm
        name: LLM integration tests
        language: system
        entry: make test-llm
        pass_filenames: false
        always_run: true
        stages: [pre-push]
