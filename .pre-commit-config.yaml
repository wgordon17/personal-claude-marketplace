repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: claudelint
        name: claudelint
        language: system
        entry: uvx claudelint --strict
        pass_filenames: false
        files: \.(json|md|yaml)$
