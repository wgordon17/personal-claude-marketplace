repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: skillsaw
        name: skillsaw
        language: system
        entry: uvx skillsaw --strict
        pass_filenames: false
        files: \.(json|md|yaml)$

      - id: test-llm
        name: LLM integration tests
        language: system
        entry: make test-llm
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: skill-eval
        name: Skill evaluation (DeepEval)
        language: system
        entry: make eval-prepush
        pass_filenames: false
        always_run: true
        stages: [pre-push]
