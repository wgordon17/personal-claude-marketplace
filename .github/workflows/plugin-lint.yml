name: Plugin Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '**.json'
      - '**.md'
      - '**/.mcp.json'
      - '**/hooks.json'
      - '**/plugin.json'
      - '**/SKILL.md'
      - '.claudelint.yaml'
      - '.github/workflows/plugin-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plugin-lint:
    name: Plugin Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@803947b9bd8e9f986429fa0c5a41c367cd732b41  # v7
      - run: uvx claudelint --strict
      - name: Validate ATLAS.md markers
        run: uv run .claude/commands/validate-atlas-markers.py
      - name: Check ATLAS.md staleness
        if: github.event_name == 'pull_request'
        run: |
          base=${{ github.event.pull_request.base.sha }}
          if git diff --name-only "$base"...HEAD | grep -q 'plugin\.json$'; then
            if ! git diff --name-only "$base"...HEAD | grep -q '^ATLAS\.md$'; then
              echo "::warning file=ATLAS.md::Plugin versions changed but ATLAS.md was not updated. Run /project:generate-atlas to refresh."
            fi
          fi
